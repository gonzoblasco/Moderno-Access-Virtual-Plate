		var enabled = 1;
		function TOfunc() {
			var today = new Date();
			var lmonth=today.getMonth() + 1;
			var date=today.getDate();
			var year=today.getYear();
			var hours = today.getHours();
			var minutes = today.getMinutes();
			var seconds = today.getSeconds()
		
			if ((navigator.appName == "Microsoft Internet Explorer") && (year < 2000))
				year="19" + year;
			if (navigator.appName == "Netscape")
				year=1900 + year;
			var DateValue;
			DateValue = ((lmonth < 10) ? "0" : "") + lmonth
			DateValue += ((date < 10) ? "/0" : "/") + date
			DateValue += "/" + year;		
			document.forms[2].SetupDate.value = DateValue

			var timeValue = ((hours < 10) ? "0" : "") + hours;
			timeValue += ((minutes < 10) ? ":0" : ":") + minutes
			timeValue += ((seconds < 10) ? ":0" : ":") + seconds
			document.forms[2].SetupTime.value = timeValue;
		}		

		function send(f)
		{
			var today = new Date();
			f.day.value=today.getDay();
			f.submit();
		}

function select_change( i, dst_type )
