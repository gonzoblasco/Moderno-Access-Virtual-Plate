	function send_web(form)
	{
		var num = document.userdata.CardID.value;
		var tab = document.userdata;
		var str="";
		var i;
		var id_list = new Array(0,0,0,0,0,0,0,0);
		document.userdata.type.value="user_data";
		if(hex_dec){
			str=num;
			for(i=0;i<8;i++){
				if(str.length == 1){
					id_list[7-i] = str.substring(str.length-1,str.length);
					str="";
					break;
				}
				else if(str.length>1){
					id_list[7-i] = str.substring(str.length-2,str.length);
					str=str.substr(0,str.length-2);
				}
				else
					break;
			}
		}
		else{
			if(num){
				str=num-0;
				if(fc_id)
				{
					str = parseInt(num/100000).toString(16);
					if(parseInt(num%100000)<=15)
						str += "000";
					else if(parseInt(num%100000)<=255)
						str += "00";
					else if(parseInt(num%100000)<=4095)
						str += "0";
					str += parseInt(num%100000).toString(16);
				}
				else
				{
					str=str.toString(16);
				}
				for(i=0;i<8;i++){
					if(str.length == 1){
						id_list[7-i] = str.substring(str.length-1,str.length);
						str="";
						break;
					}
					else if(str.length>1){
						id_list[7-i] = str.substring(str.length-2,str.length);
						str=str.substr(0,str.length-2);
					}
					else
						break;
				}
			}
		}
		
		for(i=0;i<8;i++){
			tab.card[i].value = parseInt(id_list[i],16);
		}
		form.submit();
	}
	function hex2dec(strhex)
	{
		hextable="0123456789ABCDEF"; 
		
		Q = strhex.toUpperCase();
		tmpDec = "";
		
		while(1==1)
		{
			if (Q == "0" || Q == "")
			{
				break;
			}
			tmphex = Q;
			Q = "";
			M = 0;
			for(i=0;i<tmphex.length;i++)
			{
				V = M*16 + hextable.indexOf(tmphex.charAt(i)); 
				if (!((Q.length == 0) && (V == 0)))
				{ 
				    //Q = Q.concat(hextable.charAt(Math.floor(V / 10)));
					Q = Q + hextable.charAt(Math.floor(V / 10));
				    M = V % 10;
				}
			}
			tmpDec = M + tmpDec;
		}
		return(tmpDec);
	}
