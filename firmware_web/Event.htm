<script>
	var table1 = document.getElementById("table_1");

		}

	table_d.rows[2].cells[0].innerHTML = "<font size=2><b>" + lan_text[lan][32] + "</b></font>";

		document.getElementsByTagName("label")[i*2].innerHTML = "<font size=2><b>&nbsp;&nbsp;" + lan_text[lan][35+i] + " :&nbsp;</b></font>";
		document.getElementsByTagName("label")[1+i*2].innerHTML = "<font size=2>" + lan_text[lan][43+i] + "</font>";

function show_event(){
	for(var i=0;i<num;i++){
		table_d.rows[i+3].cells[0].innerHTML = "<font size=2>" + event_list[i] + "</font>";
		if(event_switch1[i]==1)
			table_d.rows[i+3].cells[1].innerHTML = "<IMG SRC='v.gif'>";
		else
			table_d.rows[i+3].cells[1].innerHTML = "<IMG SRC='no.gif'>";
		if(event_switch2[i]==1)
			table_d.rows[i+3].cells[2].innerHTML = "<IMG SRC='v.gif'>";
		else
			table_d.rows[i+3].cells[2].innerHTML = "<IMG SRC='no.gif'>";

		else

		else

		else
			table_d.rows[i+3].cells[5].innerHTML = "<IMG SRC='no.gif'>";

	table_d.rows[1].cells[i+1].innerHTML = hold_time_list[i];
