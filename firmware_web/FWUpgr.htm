var lan_text = new Array();
lan_text[0]=e_text;
lan_text[1]=chs_text;
lan_text[2]=cht_text;

	var duration=50
	var clipright=0
	var widthIE=0
	var widthNS=0
	var bName = navigator.appName// check bowser kind
	var lan = <!-#status.cgi$language-->;

		function postaction()
		{
	 		clipright=0
	 		widthIE=0
	 		widthNS=0
	 		initializebar();
		}
	
		function initializebar()
		{
	 		if (document.getElementById)
	 		{
	 			  document.getElementById('baranchor').style.visibility="visible"
	  			if(bName=="Microsoft Internet Explorer"){
	  		     widthIE=document.getElementById('bar').style.pixelWidth}
	  		else(
	  			   widthIE=parseInt(document.getElementById('bar').style.width,10)
	  			)
	  			startIE=setInterval("increaseIE()",50)
	 		}
		}
	

		function increaseIE()
		{
	 		document.getElementById('bar').style.clip="rect(0 "+clipright+" auto 0)"
	 		window.status=lan_text[lan][3];
	
	 		if (clipright<widthIE)
	 		{
	  			clipright=clipright+(widthIE/(duration*10))
	 		}
	 		else
	 		{
	  			window.status=''
	  			clearInterval(startIE)
	  			postaction()
	 		}
		}

		function MAN_UpGrade(form)
		{
			if (form.filename.value == "")
				alert(lan_text[lan][4]);
			else
			{
				initializebar();
				form.submit();
			}
		}
