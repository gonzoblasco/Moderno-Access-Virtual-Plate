var chs_text = new Array("进出纪录","用户编号","用户卡号","自/至(月/日/年)","No.","用户编号","姓名","日期","时间","进/出","门","备注","单一","搜寻和汇出","无","类型","数目","起始日期","结束日期","用户","事件","事件(最多5件)","全部","事件类型","汇出类型","Txt","Xls","无","搜寻","汇出");
var cht_text = new Array("進出紀錄","用戶編號","用戶卡號","自/至(月/日/年)","No.","用戶編號","姓名","日期","時間","進/出","門","備註","單一","搜尋和匯出","無","類型","數目","起始日期","結束日期","用戶","事件","事件(最多5件)","全部","事件類型","匯出類型","Txt","Xls","無","搜尋","匯出");

var hex_dec = <!-#status.cgi$HEX_DEC-->;

	function Query_me(fun_type){
		var num = document.Search.TID.value;
		var str="";
		var i;
		var id_list = new Array(0,0,0,0,0,0,0,0);
		var str_ip,str_num;
		
		str_ip=location.href;
		str_num=str_ip.lastIndexOf("/");
		str_ip=str_ip.substring(0,str_num+1)+"if.cgi?";
		str_ip+="redirect=UserLog.htm";
		str_ip+="&failure=fail.htm";
		str_ip+="&type=search_user_log&";
		if(document.Search.qtype[0].checked){
			str_ip+="type=0";
		}
		else{
			str_ip+="type=1";
		}
		if(document.Search.num[0].checked){
			str_ip+="&sel=0";
		}
		else{
			str_ip+="&sel=1";
		}

		str_ip+="&u_id=" + document.Search.UID.value;
		for(i=0;i<5;i++){
			str_ip+="&even="+document.Search.even[i].value;
		}
		str_ip+="&year="+(document.Search.s_data.value.substring(0,4)-2000);
		str_ip+="&mon="+document.Search.s_data.value.substring(5,7);
		str_ip+="&day="+document.Search.s_data.value.substring(8,10);
		str_ip+="&year="+(document.Search.e_data.value.substring(0,4)-2000);
		str_ip+="&mon="+document.Search.e_data.value.substring(5,7);
		str_ip+="&day="+document.Search.e_data.value.substring(8,10);

		if(hex_dec){
			str=num;
			for(i=0;i<8;i++){
				if(str.length == 1){
					id_list[7-i] = str.substring(str.length-1,str.length);
					str="";
					break;
				}
				else if(str.length>1){
					id_list[7-i] = str.substring(str.length-2,str.length);
					str=str.substr(0,str.length-2);
				}
				else
					break;
			}
		}
		else{
			if(num){
				str=parseInt(num).toString(16);
				for(i=0;i<8;i++){
					if(str.length == 1){
						id_list[7-i] = str.substring(str.length-1,str.length);
						str="";
						break;
					}
					else if(str.length>1){
						id_list[7-i] = str.substring(str.length-2,str.length);
						str=str.substr(0,str.length-2);
					}
					else
						break;
				}
			}
		}
		
		for(i=0;i<8;i++){
			str_ip += "&card=" + parseInt(id_list[i],16);
		}
		if(fun_type)
			str_ip += "&fun_t=1";
		else
			str_ip += "&fun_t=0";
		if(document.Search.e_type[0].checked)
			str_ip += "&e_t=0";
		else
			str_ip += "&e_t=1";
		location.href=str_ip;
	}
	function hmpage(){
		var str_ip,str_num;
		str_ip=location.href;
		str_num=str_ip.lastIndexOf("/");
		str_ip=str_ip.substring(0,str_num+1)+"man.cgi?";
		str_ip+="redirect=hmpage.htm";
		str_ip+="&failure=fail.htm";
		str_ip+="&type=hmacclog";
		location.href=str_ip;
	}
</script>

function sortlist(){
	var selectArray=new Array();
	for(i=1;i<Search.even[0].length;i++){
		selectArray[i-1]=new Array();
		selectArray[i-1][0]=Search.even[0].options[i].text;
		selectArray[i-1][1]=Search.even[0].options[i].value;
	}
	selectArray.sort();
	for(j=0;j<5;j++){
		for(i=1;i<Search.even[j].length;i++){
			Search.even[j].options[i].text=selectArray[i-1][0];
			Search.even[j].options[i].value=selectArray[i-1][1];
		}
	}
}
document.all.s_data.value = nowTime.getFullYear() + "/" + (String(nowTime.getMonth()+1).length>1?String(nowTime.getMonth()+1):"0"+String(nowTime.getMonth()+1)) + "/" + (nowTime.getDate().toString().length>1?nowTime.getDate():"0"+nowTime.getDate());
document.all.e_data.value = nowTime.getFullYear() + "/" + (String(nowTime.getMonth()+1).length>1?String(nowTime.getMonth()+1):"0"+String(nowTime.getMonth()+1)) + "/" + (nowTime.getDate().toString().length>1?nowTime.getDate():"0"+nowTime.getDate());

if(user_num>=100000)
	document.getElementById("table_2").rows[0].cells[2].style.display="none";

function change(){
	if(document.Search.qtype[0].checked){
		table1.rows[2].style.display="";
		table1.rows[3].style.display="";
		table1.rows[4].style.display="none";
		table1.rows[5].style.display="none";
		label[2].innerHTML = "<font size=2 color='#464646'>" + lan_text[lan][12] + "</font>";
	}
	else{
		table1.rows[2].style.display="none";
		table1.rows[3].style.display="none";
		table1.rows[4].style.display="";
		table1.rows[5].style.display="";
		label[2].innerHTML = "<font size=2 color='#464646'>" + lan_text[lan][21] + "</font>";
	}
	change_num();
}

function change_num(){
	var status;
	if(document.Search.num[0].checked)
		status="";
	else
		status="none";
	if(document.Search.qtype[0].checked){
		table1.rows[2].style.display=status;
		table1.rows[3].style.display=status;
	}
	else{
		table1.rows[4].style.display=status;
		table1.rows[5].style.display=status;
	}
}
