<script ID="clientEventHandlersJS" LANGUAGE="javascript">

var lan_text = new Array();
lan_text[0]=e_text;

	var lan = <!-#status.cgi$language-->;
	document.title=lan_text[lan][0];
	for(i=0;i<3;i++)
		document.getElementById("table_1").rows[i].cells[0].innerHTML = "<font size='4'><b>" + lan_text[lan][0+i] + "</b></font>";

	function window_onload() 
	{			
	   	window.setInterval("Refresh()",5000);
	}

	{  
		location="Status.htm";
