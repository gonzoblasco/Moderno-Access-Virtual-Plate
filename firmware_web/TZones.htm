<HTML>
<HEAD>
	<link rel="stylesheet" href="Sstandle.css" type="text/css">
	<META http-equiv=Content-Type content="text/html; charset=utf-8">
	<base target="Status">
	<META HTTP-EQUIV="Pragma" CONTENT="no-cache">
	<META HTTP-EQUIV="Cache-Control" CONTENT="no-cache">
	<META HTTP-EQUIV="Expires" CONTENT="0">
</HEAD>
<script>
var e_text = new Array("Warning! The current Data will be lost.","Are you sure?","Time Zone ID","Time Zone List","Set");
var chs_text = new Array("警告! 资料将会删除.","是否继续?","时区设定","时区清单","设定");
var cht_text = new Array("Atención! Los datos actuales se perderán.","Está seguro?","ID de Zona Horaria","Lista de Zona Horaria","Set");
var lan_text = new Array();
lan_text[0]=e_text;
lan_text[1]=chs_text;
lan_text[2]=cht_text;

	var lan = <!-#status.cgi$language-->;
	function cvalue(f)
	{
		if (confirm(lan_text[lan][0] + "\n" + lan_text[lan][1]))
		{
			f.submit();
		}
	}
</script>
<BODY><font face="Arial">
	<table width="800">
		<tr><td><br></td></tr>
		<tr><td class="title" id="tit"></td></tr>
		<tr><td align="center">
			<TABLE width="80%" align="center">
				<!-#man.cgi$time_zone-->
					<FORM name=TZList action=man.cgi method=get>
					<input type="hidden" name="redirect" value="addtz.htm">
					<input type="hidden" name="failure" value="fail.htm">
					<input type="hidden" name="type" value="want_time_zone">
				<tr>
					<td align="right" id="tid"></td>
					<td>
						<select	name=ID>
							<script>
								for(i=2;i<10;i++)
									document.write('<OPTION VALUE='+i+'>00'+i+'</OPTION>');
								for(i=10;i<100;i++)
									document.write('<OPTION VALUE='+i+'>0'+i+'</OPTION>');
								for(i=100;i<120;i++)
									document.write('<OPTION VALUE='+i+'>'+i+'</OPTION>');
							</script>
						</select>
						&nbsp;<INPUT type="submit" name=add_tz>
					</td>
				</tr>
					</form>
			</TABLE>
		</td></tr>
	</table>
</font></BODY>
<script>
	document.title=lan_text[lan][3];
	document.getElementById("tit").innerHTML = "<font class='titlefont'><b>&nbsp;&nbsp;" + lan_text[lan][3] + "</b></font>";
	document.getElementById("tid").innerHTML = "<font size='2'><b>" + lan_text[lan][2] + " :</b></font>";
	document.all.add_tz.value = lan_text[lan][4];

	window.document.TZList.ID.value="<!-#man.cgi$TZListID-->";
</script>
</HTML>
