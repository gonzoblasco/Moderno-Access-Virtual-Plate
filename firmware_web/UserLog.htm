	<table width="100%">

					<TD width="8%" align="center"></TD>

				</TR>

<script>
var e_text = new Array("No.","User ID","User Name","Date","Time","IN/OUT","Door","Note.","User Log");
var chs_text = new Array("No.","用户编号","姓名","日期","时间","进/出","门","备注","用户查询纪录");
var cht_text = new Array("Nro.","ID de Usuario","Nombre de Usuario","Fecha","Hora","ENTRADA/SALIDA","Puerta","Nota.","Registro de Usuario");
var lan_text = new Array();
lan_text[0]=e_text;
lan_text[1]=chs_text;
lan_text[2]=cht_text;

var lan = <!-#status.cgi$language-->;
var user_num = <!-#if.cgi$maxusernum-->;
document.title=lan_text[lan][8];
for(i=0;i<8;i++){
	document.getElementById("table_1").rows[0].cells[i].innerHTML = "<B><font color='#0000FF' size='2'>" + lan_text[lan][0+i] + "</font></B>";
}
if(user_num>=100000)
		document.getElementById("table_1").rows[0].cells[2].style.display="none";
</script>
