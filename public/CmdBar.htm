	var table = document.getElementById("cmdbar");

	var lift_enable = 0;
	var lift_ms = 1;
	var str,num,link_num;
	document.all.set.value = lan_text[lan][28];
	document.all.home_mode.value = lan_text[lan][29];
	document.all.clean.value = lan_text[lan][30];
	for(i=0,j=4,x=0;i<31;i++){
		switch (i){
			case 0:
			case 6:
			case 13:
			case 23:
				str = lan_text[lan][x] + "&nbsp;";
				x++;
				break;
			case 5:
			case 12:
			case 22:
			case 30:
				str = "&nbsp;";
				break;

				str = "<A onMouseOver=\"self.status='" + lan_text[lan][j] + "'; return true\" onMouseOut=\"self.status=''; return true;\" href=\"" + w_link[j-4] + "\" target='_blank'>" + lan_text[lan][j] + "&nbsp;</A>"

				break;
			case 18:
				if(lift_enable == 1){
					num = 27;
					//if(lift_ms)

					//else
						link_num=j-4;
				}
				else{
					num = j;
					link_num=j-4;
				}
				str = "<A onMouseOver=\"self.status='" + lan_text[lan][num] + "'; return true\" onMouseOut=\"self.status=''; return true;\" href=\"" + w_link[link_num] + "\" target='Status'>" + lan_text[lan][num] + "&nbsp;</A>";
